<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pazport to English | Slytherin Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --slytherin-green: #1A472A;
            --slytherin-silver: #C5C5C5;
            --deep-black: #0a0a0a;
            --parchment: #F5F5DC;
            --light-parchment: #FFFEF7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'EB Garamond', serif;
            background-color: var(--deep-black);
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
                url('https://images.unsplash.com/photo-1532012197267-da84d127e765?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-attachment: fixed; background-position: center;
            min-height: 100vh; padding: 10px;
            display: flex; align-items: center; justify-content: center;
        }

        .container {
            width: 100%; max-width: 1100px;
            background-color: var(--parchment);
            background-image: url('https://www.transparenttextures.com/patterns/aged-paper.png');
            border: 8px solid var(--slytherin-green);
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            border-radius: 12px; overflow: hidden; position: relative;
            min-height: 80vh; display: flex; flex-direction: column; justify-content: center;
        }

        @media (min-width: 1024px) {
            .container::before, .container::after {
                content: ''; position: absolute; top: 0; bottom: 0; width: 100px;
                background-image: url('https://cdn-icons-png.flaticon.com/512/4072/4072307.png');
                background-repeat: space; background-size: 60px; opacity: 0.05; pointer-events: none;
            }
            .container::before { left: 10px;  border-right: 2px solid rgba(26,71,42,0.1); }
            .container::after  { right: 10px; border-left:  2px solid rgba(26,71,42,0.1); }
            .screen { padding: 40px 120px !important; }
        }

        .screen  { padding: 20px; text-align: center; width: 100%; box-sizing: border-box; }
        .hidden  { display: none !important; }

        h1 { font-family: 'Cinzel', serif; color: var(--slytherin-green); font-size: clamp(1.8rem,5vw,3.5rem); margin-bottom: 5px; text-shadow: 1px 1px 0 rgba(0,0,0,0.2); }
        .slogan { font-family: 'Cinzel', serif; color: #555; font-size: clamp(0.9rem,2vw,1.2rem); margin-bottom: 30px; font-weight: bold; letter-spacing: 1px; }

        .input-group { max-width: 500px; margin: 15px auto; text-align: left; }
        .input-group label { display: block; font-family: 'Cinzel', serif; color: var(--slytherin-green); font-weight: bold; margin-bottom: 5px; }

        input[type="text"], select {
            width: 100%; padding: 15px; border: 3px solid var(--slytherin-green);
            background: var(--light-parchment); border-radius: 6px; font-size: 1.1rem;
            font-family: 'EB Garamond', serif;
        }

        .btn {
            padding: 15px 40px; margin-top: 20px;
            background: linear-gradient(180deg, var(--slytherin-green), #0f2b19);
            color: #d4af37 !important; border: 2px solid #555; border-radius: 6px;
            font-family: 'Cinzel', serif; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.2s;
        }
        .btn:active  { transform: scale(0.98); }
        .btn:disabled { background: #555; color: #999 !important; cursor: not-allowed; }

        /* Activity grid */
        .activity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 20px; margin-top: 30px; max-width: 900px; margin-left: auto; margin-right: auto; }
        .activity-card { background: white; border: 3px solid var(--slytherin-green); padding: 25px; border-radius: 10px; cursor: pointer; position: relative; transition: transform 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .activity-card:hover { transform: translateY(-5px); border-color: #d4af37; }
        .activity-card i { font-size: 2.5rem; color: var(--slytherin-green); margin-bottom: 10px; }
        .seal { position: absolute; top: 10px; right: 10px; color: var(--slytherin-green); font-size: 1.5rem; }

        /* Flashcard */
        .flashcard { width: 100%; max-width: 500px; height: 280px; margin: 20px auto; perspective: 1000px; cursor: pointer; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 20px; border-radius: 12px; border: 6px solid #555; box-shadow: 0 10px 25px rgba(0,0,0,0.3); flex-direction: column; }
        .front { background-color: var(--slytherin-green); }
        .front h3 { color: #fff !important; font-size: 2.5rem; text-align: center; font-family: 'Cinzel', serif; text-shadow: 2px 2px 0 #000; }
        .back  { background-color: var(--slytherin-silver); transform: rotateY(180deg); padding: 30px; }
        .back p { color: #000 !important; font-size: 1.4rem; text-align: center; font-weight: bold; line-height: 1.4; }

        /* Quiz options */
        .quiz-option { background: white; border: 2px solid var(--slytherin-green); padding: 15px; margin: 10px auto; max-width: 620px; border-radius: 8px; font-size: 1.1rem; cursor: pointer; transition: background 0.2s; text-align: left; }
        .quiz-option:hover { background: #f0f0f0; }
        .quiz-option.correct { background: #d4edda !important; border-color: #28a745 !important; cursor: default; }
        .quiz-option.wrong   { background: #f8d7da !important; border-color: #dc3545 !important; cursor: default; }
        
        /* Certificate */
        .cert-area { border: 10px double var(--slytherin-green); padding: 30px; background: white; border-radius: 5px; max-width: 700px; margin: 0 auto; }
        #cert-name { font-size: clamp(1.5rem,6vw,3rem); font-family: 'Cinzel', serif; text-decoration: underline; margin: 15px 0; display: block; color: #000; word-break: break-word; }
    </style>
</head>
<body>
<div class="container">

<section id="screen-home" class="screen">
    <i class="fas fa-shield-snake" style="font-size:4rem;color:var(--slytherin-green);margin-bottom:10px;"></i>
    <h1>Pazport to English</h1>
    <p class="slogan">The Portal of Ambition and Knowledge</p>

    <div class="input-group">
        <label>Student Full Name</label>
        <input type="text" id="studentName" placeholder="Type your name here..." oninput="updateUnitList()">
    </div>
    <div class="input-group">
        <label>Select Your Quest</label>
        <select id="unitSelect" onchange="checkStatus()"></select>
    </div>

    <button class="btn" id="startBtn" onclick="start()">Enter the Dungeons</button>
    <p id="msg" style="margin-top:15px;font-weight:bold;color:var(--slytherin-green);"></p>
</section>

<section id="screen-menu" class="screen hidden">
    <h2 id="userGreet" style="font-family:'Cinzel';color:#333;"></h2>
    <div class="activity-grid">
        <div class="activity-card" onclick="go('scrolls')">
            <div id="s-scrolls" class="seal hidden"><i class="fas fa-snake"></i></div>
            <i class="fas fa-scroll"></i><h3>Study Scrolls</h3><p>Memorize the words</p>
        </div>
        <div class="activity-card" onclick="go('quiz')">
            <div id="s-quiz" class="seal hidden"><i class="fas fa-snake"></i></div>
            <i class="fas fa-vial"></i><h3>Definition Quiz</h3><p>Test your knowledge</p>
        </div>
        <div class="activity-card" onclick="go('chamber')">
            <div id="s-chamber" class="seal hidden"><i class="fas fa-snake"></i></div>
            <i class="fas fa-magic"></i><h3>Sentence Chamber</h3><p>Unscramble the spell</p>
        </div>
    </div>
    <button class="btn" style="margin-top:40px;" onclick="claimCert()">Get Official Report</button>
</section>

<section id="screen-act" class="screen hidden">
    <div style="text-align:left;margin-bottom:10px;">
        <button class="btn" style="padding:5px 15px;margin:0;font-size:0.8rem;" onclick="show('menu')">Back</button>
    </div>
    <div id="act-content"></div>
</section>

<section id="screen-cert" class="screen hidden">
    <div class="cert-area" id="cert-box">
        <h1 id="cert-main-title" style="font-size:clamp(1.5rem,5vw,2.5rem);">Mastery Achievement Report</h1>
        <p style="font-size:1.2rem;">This document certifies that</p>
        <span id="cert-name"></span>
        <p style="font-size:1.2rem;">Has successfully completed:</p>
        <h3 id="cert-unit" style="color:var(--slytherin-green);font-size:1.5rem;"></h3>
        <p id="cert-time" style="margin-top:20px;font-weight:bold;color:#555;"></p>
        <div id="cert-code" style="margin-top:10px;font-family:monospace;font-size:0.8rem;border:1px dashed #999;padding:5px;display:inline-block;"></div>
    </div>
    <button class="btn" id="finishBtn" onclick="location.reload()">Finish Quest</button>
</section>

</div><script>
// ================================================================
//  DATABASE — STANDARD UNITS
// ================================================================
const DB = {
    "10th - Unit 3 (Part 1)": {
        words: ["Work Out","Recover","Require","Weak","Lead","Injure"],
        defs:  ["To exercise at the gym.","To take a rest and get healthy again.","To need something.","Not strong.","To be winning a game or competition.","To feel pain or damage part of your body."],
        sentences: [
            { s:"out / gym. / working / I / the / at / was",                 c:"I was working out at the gym." },
            { s:"back / recover / I / need / to / and / get / shape. / in", c:"I need to recover and get back in shape." },
            { s:"lot / Basketball / requires / a / of / skill.",            c:"Basketball requires a lot of skill." },
            { s:"weak. / My / muscles / very / are",                        c:"My muscles are very weak." },
            { s:"Miami / eight / Orlando / is / leading / by / points.",    c:"Orlando is leading Miami by eight points." },
            { s:"playing / injured / knee / I / my / hockey.",              c:"I injured my knee playing hockey." }
        ]
    },
    "10th - Unit 3 (Part 2)": {
        words: ["Competition","Goal","Inspiration","Professional","Support","Scared"],
        defs:  ["A contest where people try to win.","An aim or something you want to achieve.","Someone who makes you want to do better.","Doing a sport or activity for pay.","Cheering on a specific person or team.","Feeling afraid or terrified of something."],
        sentences: [
            { s:"first / was / She / in / competition. / her",       c:"She was in her first competition." },
            { s:"goal. / followed / Bethany / her",                  c:"Bethany followed her goal." },
            { s:"us / an / all. / is / inspiration / to / She",      c:"She is an inspiration to us all." },
            { s:"a / wants / be / to / He / surfer. / professional", c:"He wants to be a professional surfer." },
            { s:"team. / our / We / local / support",                c:"We support our local team." },
            { s:"sharks. / scared / of / I / am / very",             c:"I am very scared of sharks." }
        ]
    },
    "11th - Unit 3 (Part 1)": {
        words: ["Masterpiece","Exhibit","Talent","Landscape","Appreciate","Impress"],
        defs:  ["An artist's best piece of work.","A collection of objects shown to the public.","A natural ability to do something well.","A picture of natural scenery like mountains or trees.","To recognize the good qualities of something.","To make someone feel admiration and respect."],
        sentences: [
            { s:"painting / a / This / beautiful / masterpiece. / is",      c:"This painting is a beautiful masterpiece." },
            { s:"go / Let's / new / exhibit. / the / to",                   c:"Let's go to the new exhibit." },
            { s:"brother / a / natural / My / talent / music. / has / for", c:"My brother has a natural talent for music." },
            { s:"The / landscape / beautiful. / valley / in / the / is",    c:"The landscape in the valley is beautiful." },
            { s:"art / truly / I / appreciate / great.",                    c:"I truly appreciate great art." },
            { s:"performance / impressed / Her / everyone.",                c:"Her performance impressed everyone." }
        ]
    },
    "11th - Unit 3 (Part 2)": {
        words: ["Abstract","Canvas","Sculpture","Portrait","Gallery","Critic"],
        defs:  ["Art that does not represent real objects.","A piece of cloth used by artists to paint on.","A 3D artwork made by carving or shaping materials.","A painting or drawing of a person.","A room or building where art is displayed.","A person who judges the quality of art or literature."],
        sentences: [
            { s:"abstract / hard / understand. / is / art / to",         c:"Abstract art is hard to understand." },
            { s:"painted / on / He / large / a / canvas.",               c:"He painted on a large canvas." },
            { s:"The / marble. / is / made / of / sculpture",            c:"The sculpture is made of marble." },
            { s:"portrait / a / She / of / painted / her / mother.",     c:"She painted a portrait of her mother." },
            { s:"gallery / downtown. / new / opened / The / a",          c:"The new gallery opened downtown." },
            { s:"was / The / critic / the / impressed / by / painting.", c:"The critic was impressed by the painting." }
        ]
    }
};

// ================================================================
//  STATE
// ================================================================
let state = { name:"", unit:"", scores:{}, done:{} };

// ================================================================
//  INIT
// ================================================================
window.onload = function() { updateUnitList(); };

function updateUnitList() {
    var sel = document.getElementById('unitSelect');
    sel.innerHTML = '';
    Object.keys(DB).forEach(function(k) {
        var opt = document.createElement('option');
        opt.value = k; opt.textContent = k;
        sel.appendChild(opt);
    });
    checkStatus();
}

function checkStatus() {
    var name = document.getElementById('studentName').value.trim();
    var unit = document.getElementById('unitSelect').value;
    var msg  = document.getElementById('msg');
    if (!name) { msg.textContent = ''; return; }
    var key = name.toLowerCase() + '-' + unit;
    if (localStorage.getItem(key) === 'COMPLETED') {
        msg.textContent = '⚠️ You have already completed this quest.';
        document.getElementById('startBtn').disabled = true;
    } else {
        msg.textContent = '';
        document.getElementById('startBtn').disabled = false;
    }
}

// ================================================================
//  NAVIGATION
// ================================================================
function show(screen) {
    document.querySelectorAll('.screen').forEach(function(s) { s.classList.add('hidden'); });
    document.getElementById('screen-' + screen).classList.remove('hidden');
}

// ================================================================
//  START
// ================================================================
function start() {
    var name = document.getElementById('studentName').value.trim();
    if (!name) { alert("Please enter your full name."); return; }

    var unit = document.getElementById('unitSelect').value;
    var key  = name.toLowerCase() + '-' + unit;
    if (localStorage.getItem(key) === 'COMPLETED') { alert("You have already completed this quest!"); return; }

    state.name   = name;
    state.unit   = unit;
    state.scores = {};
    state.done   = {};

    document.getElementById('userGreet').textContent = 'Welcome, ' + name + ' — ' + unit;
    show('menu');
}

// ================================================================
//  ACTIVITY ROUTER
// ================================================================
function go(activity) {
    var data = DB[state.unit];
    if (!data) { alert("No data found for this unit."); return; }
    show('act');
    var container = document.getElementById('act-content');
    if      (activity === 'scrolls') renderScrolls(container, data);
    else if (activity === 'quiz')    renderQuiz(container, data);
    else if (activity === 'chamber') renderChamber(container, data);
}

// ================================================================
//  STUDY SCROLLS
// ================================================================
function renderScrolls(container, data) {
    var idx = 0;
    window._scrollNav = function(dir) {
        idx = Math.max(0, Math.min(data.words.length - 1, idx + dir));
        updateCard();
    };
    function updateCard() {
        document.getElementById('fc-word').textContent    = data.words[idx];
        document.getElementById('fc-def').textContent     = data.defs[idx];
        document.getElementById('fc-ctx').textContent     = "Example: " + data.sentences[idx].c;
        document.getElementById('fc-counter').textContent = (idx + 1) + ' / ' + data.words.length;
        document.getElementById('fc-el').classList.remove('flipped');
        document.getElementById('btn-prev').disabled = (idx === 0);
        document.getElementById('btn-next').disabled = (idx === data.words.length - 1);
        if (idx === data.words.length - 1) {
            state.done['scrolls'] = true;
            document.getElementById('s-scrolls').classList.remove('hidden');
        }
    }
    container.innerHTML =
        '<h2 style="font-family:\'Cinzel\';color:var(--slytherin-green);margin-bottom:5px;">Study Scrolls &nbsp;<span id="fc-counter" style="font-size:1rem;"></span></h2>' +
        '<p style="color:#555;margin-bottom:10px;">Click the card to reveal the definition and an example.</p>' +
        '<div class="flashcard" id="fc-el" onclick="this.classList.toggle(\'flipped\')">' +
        '<div class="flashcard-inner"><div class="front"><h3 id="fc-word"></h3></div>' + 
        '<div class="back"><p id="fc-def"></p><p id="fc-ctx" style="font-size:1rem; margin-top:20px; font-style:italic; color:#333; border-top:1px solid #999; padding-top:15px;"></p></div></div></div>' +
        '<div style="margin-top:10px;">' +
        '<button id="btn-prev" class="btn" style="margin:5px;" onclick="_scrollNav(-1)">&#8592; Prev</button>' +
        '<button id="btn-next" class="btn" style="margin:5px;" onclick="_scrollNav(1)">Next &#8594;</button></div>';
    updateCard();
}

// ================================================================
//  DEFINITION QUIZ
// ================================================================
function renderQuiz(container, data) {
    var idx = 0, score = 0, answered = false;
    function render() {
        var wordIdx    = idx;
        var correctDef = data.defs[wordIdx];
        var wrongPool  = data.defs.filter(function(_, i) { return i !== wordIdx; })
                                  .sort(function() { return Math.random() - 0.5; }).slice(0, 3);
        var opts       = [correctDef].concat(wrongPool).sort(function() { return Math.random() - 0.5; });
        var correctOpt = opts.indexOf(correctDef);
        var optHtml    = opts.map(function(o, i) {
            return '<div class="quiz-option" id="qopt-' + i + '" onclick="checkQuizOpt(' + i + ',' + correctOpt + ',' + data.words.length + ')">' + o + '</div>';
        }).join('');
        container.innerHTML =
            '<h2 style="font-family:\'Cinzel\';color:var(--slytherin-green);">Definition Quiz &nbsp;<span style="font-size:1rem;">(' + (idx+1) + '/' + data.words.length + ')</span></h2>' +
            '<p style="font-size:1.4rem;font-weight:bold;margin:20px 0;">What is the definition of: <br><em style="color:var(--slytherin-green);">"' + data.words[wordIdx] + '"</em>?</p>' +
            '<div id="quiz-feedback" style="min-height:1.5em;font-weight:bold;margin-bottom:10px;"></div>' +
            optHtml +
            '<p style="margin-top:20px;color:#555;">Score: ' + score + '</p>';

        window.checkQuizOpt = function(chosen, correct, total) {
            if (answered) return;
            answered = true;
            var fb = document.getElementById('quiz-feedback');
            if (chosen === correct) {
                score++;
                document.getElementById('qopt-' + chosen).classList.add('correct');
                fb.textContent = '✅ Correct!'; fb.style.color = 'green';
            } else {
                document.getElementById('qopt-' + chosen).classList.add('wrong');
                document.getElementById('qopt-' + correct).classList.add('correct');
                fb.textContent = '❌ Wrong! Review the correct answer highlighted below.'; fb.style.color = 'red';
            }
            setTimeout(function() {
                idx++; answered = false;
                if (idx < data.words.length) { render(); }
                else {
                    state.scores['quiz'] = score; state.done['quiz'] = true;
                    document.getElementById('s-quiz').classList.remove('hidden');
                    container.innerHTML =
                        '<h2 style="font-family:\'Cinzel\';color:var(--slytherin-green);">Quiz Complete!</h2>' +
                        '<p style="font-size:1.5rem;margin:20px 0;">You scored <strong>' + score + '/' + total + '</strong></p>' +
                        '<button class="btn" onclick="show(\'menu\')">Return to Menu</button>';
                }
            }, 1800); // Se dio un poco más de tiempo para que lean la corrección
        };
    }
    render();
}

// ================================================================
//  SENTENCE CHAMBER
// ================================================================
function renderChamber(container, data) {
    var idx = 0, score = 0;
    function render() {
        var item = data.sentences[idx];
        container.innerHTML =
            '<h2 style="font-family:\'Cinzel\';color:var(--slytherin-green);">Sentence Chamber &nbsp;<span style="font-size:1rem;">(' + (idx+1) + '/' + data.sentences.length + ')</span></h2>' +
            '<p style="color:#555;margin:10px 0;">Unscramble the words and type the correct sentence:</p>' +
            '<div style="background:var(--slytherin-green);color:#fff;padding:15px;border-radius:8px;margin:15px auto;max-width:600px;font-size:1.2rem;letter-spacing:1px;">' + item.s + '</div>' +
            '<input type="text" id="chamber-input" placeholder="Type the correct sentence here..." style="max-width:600px;margin:10px auto;display:block;" onkeydown="if(event.key===\'Enter\') checkChamber()">' +
            '<div id="chamber-feedback" style="min-height:1.5em;font-weight:bold;margin:10px 0;"></div>' +
            '<button class="btn" onclick="checkChamber()">Cast Spell</button>' +
            '<p style="margin-top:15px;color:#555;">Score: ' + score + '</p>';
        document.getElementById('chamber-input').focus();
        window.checkChamber = function() {
            var input = document.getElementById('chamber-input').value.trim();
            var fb    = document.getElementById('chamber-feedback');
            if (input.toLowerCase() === item.c.toLowerCase()) {
                score++;
                fb.textContent = '✅ Perfect spell!'; fb.style.color = 'green';
            } else {
                fb.innerHTML = '❌ Not quite. Correct: <em>' + item.c + '</em>'; fb.style.color = 'red';
            }
            setTimeout(function() {
                idx++;
                if (idx < data.sentences.length) { render(); }
                else {
                    state.scores['chamber'] = score; state.done['chamber'] = true;
                    document.getElementById('s-chamber').classList.remove('hidden');
                    container.innerHTML =
                        '<h2 style="font-family:\'Cinzel\';color:var(--slytherin-green);">Chamber Complete!</h2>' +
                        '<p style="font-size:1.5rem;margin:20px 0;">You scored <strong>' + score + '/' + data.sentences.length + '</strong></p>' +
                        '<button class="btn" onclick="show(\'menu\')">Return to Menu</button>';
                }
            }, 1800);
        };
    }
    render();
}

// ================================================================
//  CERTIFICATE & ENVÍO A GOOGLE SHEETS
// ================================================================
function claimCert() {
    var required = ['scrolls','quiz','chamber'];
    var missing  = required.filter(function(k) { return !state.done[k]; });
    if (missing.length > 0) {
        var names = { scrolls:'Study Scrolls', quiz:'Definition Quiz', chamber:'Sentence Chamber' };
        alert('You must complete the following first:\n' + missing.map(function(k) { return '• ' + names[k]; }).join('\n'));
        return;
    }

    var urlGoogleScript = "https://script.google.com/macros/s/AKfycbzmug793SljC14vQ0l88smAa0TrgmKFA646miiD2cXn7ApZokKY-Aa0us2t_1eK2lxzTQ/exec"; 
    
    var formData = new FormData();
    formData.append("name", state.name);
    formData.append("unit", state.unit);
    
    var totalScore = (state.scores['quiz'] || 0) + (state.scores['chamber'] || 0);
    formData.append("score", "Completado - Score: " + totalScore); 

    fetch(urlGoogleScript, {
        method: "POST",
        body: formData,
        mode: "no-cors" 
    }).then(() => {
        console.log("Datos enviados a la base de datos mágicamente.");
    }).catch(error => console.error("Error mágico:", error));

    var key = state.name.toLowerCase() + '-' + state.unit;
    localStorage.setItem(key, 'COMPLETED');
    show('cert');
    document.getElementById('cert-main-title').textContent = 'Mastery Achievement Report';
    document.getElementById('cert-name').textContent       = state.name;
    document.getElementById('cert-unit').textContent       = state.unit;
    document.getElementById('cert-time').textContent       = 'Completed: ' + new Date().toLocaleString();
    document.getElementById('cert-code').textContent       =
        'AUTH: ' + Math.random().toString(36).substr(2,9).toUpperCase() + '-' + Date.now().toString(36).toUpperCase();
}
</script>
</body>
</html>
