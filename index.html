<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pazport to English | Slytherin Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --slytherin-green: #1A472A;
            --slytherin-silver: #C5C5C5;
            --deep-black: #0a0a0a;
            --parchment: #F5F5DC;
            --light-parchment: #FFFEF7;
            --gold: #d4af37;
            --danger: #8a0303;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'EB Garamond', serif;
            background-color: var(--deep-black);
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)),
                url('https://images.unsplash.com/photo-1532012197267-da84d127e765?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-attachment: fixed; background-position: center;
            min-height: 100vh; padding: 10px;
            display: flex; align-items: center; justify-content: center;
        }

        .container {
            width: 100%; max-width: 1100px;
            background-color: var(--parchment);
            background-image: url('https://www.transparenttextures.com/patterns/aged-paper.png');
            border: 8px solid var(--slytherin-green);
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            border-radius: 12px; overflow: hidden; position: relative;
            min-height: 80vh; display: flex; flex-direction: column; justify-content: center;
            padding: 20px;
        }

        @media (min-width: 1024px) {
            .container::before, .container::after {
                content: ''; position: absolute; top: 0; bottom: 0; width: 100px;
                background-image: url('https://cdn-icons-png.flaticon.com/512/4072/4072307.png');
                background-repeat: space; background-size: 60px; opacity: 0.05; pointer-events: none;
            }
            .container::before { left: 10px; border-right: 2px solid rgba(26,71,42,0.1); }
            .container::after  { right: 10px; border-left:  2px solid rgba(26,71,42,0.1); }
            .screen { padding: 40px 100px !important; }
        }

        .screen  { padding: 20px; text-align: center; width: 100%; box-sizing: border-box; }
        .hidden  { display: none !important; }

        h1, h2, h3 { font-family: 'Cinzel', serif; color: var(--slytherin-green); }
        h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin-bottom: 5px; text-shadow: 1px 1px 0 rgba(0,0,0,0.2); font-weight: 900; }
        .slogan { font-family: 'Cinzel', serif; color: #555; font-size: clamp(1rem,2vw,1.2rem); margin-bottom: 25px; font-weight: 700; letter-spacing: 1px; }

        .quote-box {
            background: rgba(26, 71, 42, 0.05); color: var(--slytherin-green);
            padding: 15px 25px; border-radius: 8px;
            font-style: italic; font-weight: 600; font-size: 1.15rem;
            margin: 0 auto 30px auto; max-width: 700px;
            border-left: 5px solid var(--gold); border-right: 5px solid var(--gold);
        }

        .input-group { max-width: 450px; margin: 15px auto; text-align: left; }
        .input-group label { display: block; font-family: 'Cinzel', serif; font-size: 1rem; color: var(--slytherin-green); font-weight: bold; margin-bottom: 6px; }

        input[type="text"], select {
            width: 100%; padding: 15px; border: 3px solid var(--slytherin-green);
            background: var(--light-parchment); border-radius: 6px; font-size: 1.15rem;
            font-family: 'EB Garamond', serif;
        }

        .btn {
            padding: 15px 40px; margin-top: 20px;
            background: linear-gradient(180deg, var(--slytherin-green), #0f2b19);
            color: var(--gold) !important; border: 2px solid #555; border-radius: 6px;
            font-family: 'Cinzel', serif; font-size: 1.15rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: 0.2s;
        }
        .btn:hover:not(:disabled) { border-color: var(--gold); }
        .btn:active:not(:disabled) { transform: scale(0.98); }
        .btn:disabled { background: #cbd5e1; color: #64748b !important; border-color: #94a3b8; cursor: not-allowed; box-shadow: none; }

        .activity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 20px; margin-top: 40px; }
        .activity-card { 
            background: var(--light-parchment); border: 3px solid var(--slytherin-green); 
            padding: 30px 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; 
            position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .activity-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .activity-card i { font-size: 2.8rem; color: var(--slytherin-green); margin-bottom: 15px; }
        .activity-card.locked-card { opacity: 0.6; cursor: not-allowed; background: #e8e8e8; }
        .activity-card.locked-card:hover { transform: translateY(0); border-color: var(--slytherin-green); }
        .seal { position: absolute; top: 15px; right: 15px; color: var(--slytherin-green); font-size: 1.6rem; }
        .lock-badge { position: absolute; top: 15px; right: 15px; color: #777; font-size: 1.3rem; }

        /* Progress bars */
        .xp-wrap { max-width: 550px; margin: 20px auto 0; }
        .xp-label { font-family: 'Cinzel', serif; font-size: 1rem; color: var(--slytherin-green); margin-bottom: 8px; display: flex; justify-content: space-between; font-weight: bold; }
        .xp-track, .activity-progress-track { background: #dcdcdc; border-radius: 20px; height: 12px; overflow: hidden; border: 1px solid #aaa; }
        .xp-fill, .activity-progress-fill { height: 100%; background: linear-gradient(90deg, var(--slytherin-green), var(--gold)); transition: width 0.5s ease; }
        .activity-progress { max-width: 650px; margin: 10px auto 20px; }

        .flashcard { width: 100%; max-width: 550px; height: 320px; margin: 20px auto; perspective: 1000px; cursor: pointer; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; border-radius: 12px; border: 6px solid #444; }
        .front { background-color: var(--slytherin-green); }
        .front h3 { color: #fff !important; font-size: 3.2rem; text-shadow: 2px 2px 0 #000; }
        .back { transform: rotateY(180deg); background-color: var(--slytherin-silver); }
        .back p { font-size: 1.6rem; font-weight: 700; color: #000; text-align: center; }
        .example-sentence { font-size: 1.2rem; font-style: italic; margin-top: 15px; background: rgba(255,255,255,0.4); padding: 10px; border-radius: 8px; border-top: 2px solid #999; }

        .tts-btn { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.4); color: #fff; border-radius: 50%; width: 55px; height: 55px; cursor: pointer; font-size: 1.4rem; margin-bottom: 15px; }
        
        .quiz-option { 
            background: var(--light-parchment); border: 2px solid var(--slytherin-green); 
            padding: 18px 20px; margin: 12px auto; max-width: 650px; 
            border-radius: 8px; font-size: 1.25rem; cursor: pointer; font-weight: 600;
        }
        .quiz-option.correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .quiz-option.wrong   { background: #f8d7da !important; border-color: var(--danger) !important; color: #721c24; opacity: 0.7; }

        .hint-box { background: rgba(212, 175, 55, 0.15); border: 2px solid var(--gold); color: #5a4500; padding: 15px; margin: 15px auto; border-radius: 6px; max-width: 650px; font-size: 1.1rem; display: none; font-weight: 600; }
        .hint-box.active { display: block; }

        .word-bank { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px auto; padding: 15px; border: 2px dashed #888; background: rgba(255,255,255,0.5); border-radius: 8px; }
        .word-tile { background: var(--slytherin-green); color: #fff; padding: 12px 20px; border-radius: 6px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        .word-tile.used { opacity: 0.3; pointer-events: none; }
        .answer-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; min-height: 65px; border-bottom: 3px solid var(--slytherin-green); margin-bottom: 15px; }
        .answer-tile { background: var(--light-parchment); color: var(--slytherin-green); padding: 12px 20px; border-radius: 6px; font-size: 1.2rem; font-weight: bold; border: 2px solid var(--slytherin-green); }

        .cert-area { border: 10px double var(--slytherin-green); padding: 40px; background: var(--light-parchment); border-radius: 8px; max-width: 700px; margin: 0 auto; }
        #cert-name { font-size: clamp(1.8rem, 5vw, 2.8rem); font-family: 'Cinzel', serif; color: var(--slytherin-green); font-weight: 900; text-decoration: underline; display: block; margin: 15px 0; }
        .final-grade-circle { width: 140px; height: 140px; border-radius: 50%; background: var(--slytherin-green); color: var(--gold); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 25px auto; border: 4px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .final-grade-circle span { font-size: 3rem; font-weight: 900; font-family: 'Cinzel'; }
    </style>
</head>
<body>
<div class="container" id="main-container">

<section id="screen-home" class="screen">
    <i class="fas fa-shield-snake" style="font-size:4.5rem;color:var(--slytherin-green);margin-bottom:10px;"></i>
    <h1>Pazport to English</h1>
    <p class="slogan">The Portal of Ambition and Knowledge</p>
    <div class="quote-box" id="motivational-quote"></div>

    <div class="input-group">
        <label>Student Full Name</label>
        <input type="text" id="studentName" placeholder="Type your full name..." oninput="checkStatus()">
    </div>
    
    <div class="input-group">
        <label>Grade & Section</label>
        <select id="sectionSelect" onchange="checkStatus()">
            <option value="">-- Select Section --</option>
            <option value="9th Grade - A">9th Grade - A</option>
            <option value="9th Grade - B">9th Grade - B</option>
            <option value="10th Grade - A">10th Grade - A</option>
            <option value="10th Grade - B">10th Grade - B</option>
            <option value="11th Grade - A">11th Grade - A</option>
            <option value="11th Grade - B">11th Grade - B</option>
        </select>
    </div>

    <div class="input-group">
        <label>Select Unit Quest</label>
        <select id="unitSelect" onchange="checkStatus()"></select>
    </div>

    <button class="btn" id="startBtn" onclick="start()" disabled>Enter the Dungeons</button>
    <p id="msg" style="margin-top:15px; font-weight:bold; color:var(--danger); font-size:1.1rem; font-family:'Cinzel';"></p>
</section>

<section id="screen-menu" class="screen hidden">
    <h2 id="userGreet" style="font-size:2rem;"></h2>
    <p style="color:#555; font-size:1.1rem; font-weight:bold;">Complete all activities to unlock your grade.</p>
    
    <div class="xp-wrap">
        <div class="xp-label"><span>Quest Progress</span><span id="xp-text">0 / 4</span></div>
        <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%;"></div></div>
    </div>

    <div class="activity-grid">
        <div class="activity-card" id="card-scrolls" onclick="go('scrolls')">
            <div id="s-scrolls" class="seal hidden"><i class="fas fa-check-circle"></i></div>
            <i class="fas fa-scroll"></i><h3>Study Scrolls</h3>
        </div>
        <div class="activity-card locked-card" id="card-quiz" onclick="gateCheck('quiz')">
            <div id="s-quiz" class="seal hidden"><i class="fas fa-check-circle"></i></div>
            <div class="lock-badge" id="lock-quiz"><i class="fas fa-lock"></i></div>
            <i class="fas fa-vial"></i><h3>Definition Quiz</h3>
        </div>
        <div class="activity-card locked-card" id="card-chamber" onclick="gateCheck('chamber')">
            <div id="s-chamber" class="seal hidden"><i class="fas fa-check-circle"></i></div>
            <div class="lock-badge" id="lock-chamber"><i class="fas fa-lock"></i></div>
            <i class="fas fa-magic"></i><h3>Sentence Chamber</h3>
        </div>
        <div class="activity-card locked-card" id="card-blanks" onclick="gateCheck('blanks')">
            <div id="s-blanks" class="seal hidden"><i class="fas fa-check-circle"></i></div>
            <div class="lock-badge" id="lock-blanks"><i class="fas fa-lock"></i></div>
            <i class="fas fa-feather-alt"></i><h3>Fill the Blanks</h3>
        </div>
    </div>
    
    <button class="btn" style="margin-top:40px; font-size:1.3rem; padding: 20px 50px;" id="btn-report" onclick="claimCert()" disabled>Submit to the Ministry</button>
</section>

<section id="screen-act" class="screen hidden">
    <div style="text-align:left; margin-bottom:20px;">
        <button class="btn" style="padding:10px 20px; margin:0;" onclick="show('menu')">Retreat</button>
    </div>
    <div id="act-content"></div>
</section>

<section id="screen-cert" class="screen hidden">
    <div class="cert-area">
        <i class="fas fa-award" style="font-size:4.5rem; color:var(--gold); margin-bottom:15px;"></i>
        <h1>Mastery Report</h1>
        <span id="cert-name"></span>
        <h3 id="cert-unit"></h3>
        <div class="final-grade-circle"><span id="cert-final-grade"></span><small>Grade</small></div>
        <p id="cert-time"></p>
        <div id="cert-code"></div>
    </div>
    <button class="btn" style="margin-top:35px;" onclick="location.reload()">Finish</button>
</section>

</div>

<script>
const motivationalQuotes = [
    "“The secret of getting ahead is getting started.”", "“Mistakes are proof that you are trying.”",
    "“Believe you can and you're halfway there.”", "“It always seems impossible until it's done.”",
    "“Don't watch the clock; keep going.”", "“Small progress adds up to big results.”",
    "“The expert in anything was once a beginner.”", "“Strive for progress, not perfection.”"
];

const DB = {
    "10th - Unit 3 (Part 1)": {
        words: ["Work Out","Recover","Require","Weak","Lead","Injure"],
        defs:  ["To exercise at the gym.","To take a rest and get healthy again.","To need something.","Not strong.","To be winning a game or competition.","To feel pain or damage part of your body."],
        examples: ["I work out every morning.", "She needed to recover.", "This requires effort.", "I felt weak.", "Our team is leading.", "Don't injure yourself."],
        cloze: ["I ________ every morning at the gym.", "She needed to ________ after the injury.", "Some sports ________ a lot of effort.", "I felt ________ after being sick.", "A good captain will ________ the team.", "Be careful not to ________ your knee."],
        hints: ["Gym exercise.", "Getting healthy again.", "To need.", "Not strong.", "Winning.", "Causing pain."],
        sentences: [{s:"out / gym. / working / I / the / at / was", c:"I was working out at the gym."}, {s:"back / recover / I / need / to", c:"I need to recover."}]
    },
    "11th - Unit 3 (Part 1)": {
        words: ["Masterpiece","Exhibit","Talent","Landscape","Appreciate","Impress"],
        defs:  ["An artist's best piece of work.","A collection shown to the public.","A natural ability.","A picture of natural scenery.","To recognize the good qualities.","To make someone feel admiration."],
        examples: ["A famous masterpiece.", "A new exhibit.", "A natural talent.", "A beautiful landscape.", "I appreciate your help.", "She impressed the audience."],
        cloze: ["The Mona Lisa is a ________.", "A new ________ at the museum.", "She has a ________ for art.", "A painting of a ________.", "I ________ your help.", "She wanted to ________ us."],
        hints: ["Best work.", "Museum display.", "Natural gift.", "Nature painting.", "To value.", "To make someone say Wow."],
        sentences: [{s:"painting / a / masterpiece. / is / This", c:"This painting is a masterpiece."}, {s:"go / Let's / new / exhibit. / the / to", c:"Let's go to the new exhibit."}]
    }
};

let state = { name:"", section:"", unit:"", scores:{}, done:{}, firstTryPoints: 0, totalPossiblePoints: 0 };

window.onload = function() {
    let weekIndex = Math.floor(Date.now() / (1000 * 60 * 60 * 24 * 7)) % motivationalQuotes.length;
    document.getElementById('motivational-quote').textContent = motivationalQuotes[weekIndex];
    let sel = document.getElementById('unitSelect');
    sel.innerHTML = '<option value="">-- Select Quest --</option>';
    Object.keys(DB).forEach(k => { let opt = document.createElement('option'); opt.value = k; opt.textContent = k; sel.appendChild(opt); });
};

function checkStatus() {
    let name = document.getElementById('studentName').value.trim();
    let section = document.getElementById('sectionSelect').value;
    let unit = document.getElementById('unitSelect').value;
    let btn = document.getElementById('startBtn');
    if (!name || !section || !unit) { btn.disabled = true; return; }
    let key = name.toLowerCase() + '-' + section + '-' + unit;
    if (localStorage.getItem(key) === 'COMPLETED') { document.getElementById('msg').textContent = '⚠️ Already submitted.'; btn.disabled = true; }
    else { document.getElementById('msg').textContent = ''; btn.disabled = false; }
}

function show(screen) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById('screen-' + screen).classList.remove('hidden');
    if (screen === 'menu') updateXPBar();
}

function updateXPBar() {
    let acts = ['scrolls','quiz','chamber','blanks'];
    let done = acts.filter(a => state.done[a]).length;
    document.getElementById('xp-fill').style.width = (done/4*100)+'%';
    document.getElementById('xp-text').textContent = done + ' / 4';
    
    // Activar el botón de Submit solo cuando todo está completo
    let submitBtn = document.getElementById('btn-report');
    if (done === 4) {
        submitBtn.disabled = false;
        submitBtn.style.background = '#28a745'; // Cambia a verde
        submitBtn.style.borderColor = '#28a745';
        submitBtn.textContent = "Submit and Get Grade";
    } else {
        submitBtn.disabled = true;
    }

    unlockCard('quiz', state.done['scrolls']);
    unlockCard('chamber', state.done['quiz']);
    unlockCard('blanks', state.done['chamber']);
}

function unlockCard(id, cond) {
    let c = document.getElementById('card-'+id);
    if (cond) { c.classList.remove('locked-card'); c.onclick = () => go(id); document.getElementById('lock-'+id).style.display='none'; }
}

function gateCheck(id) { alert('🔒 Complete the previous task first to unlock.'); }

function start() {
    state.name = document.getElementById('studentName').value.trim();
    state.section = document.getElementById('sectionSelect').value;
    state.unit = document.getElementById('unitSelect').value;
    let data = DB[state.unit];
    state.totalPossiblePoints = data.words.length * 2 + data.sentences.length;
    document.getElementById('userGreet').textContent = 'Welcome, ' + state.name.split(' ')[0];
    show('menu');
}

// TTS Global
function speak(textToSpeak) { 
    window.speechSynthesis.cancel(); 
    let u = new SpeechSynthesisUtterance(textToSpeak); 
    u.lang='en-US'; 
    window.speechSynthesis.speak(u); 
}

function go(act) {
    show('act');
    let data = DB[state.unit];
    let cont = document.getElementById('act-content');
    if (act === 'scrolls') renderScrolls(cont, data);
    if (act === 'quiz') renderQuiz(cont, data);
    if (act === 'chamber') renderChamber(cont, data);
    if (act === 'blanks') renderBlanks(cont, data);
}

function renderScrolls(cont, data) {
    let idx = 0;
    const update = () => {
        // Actualizar barra de progreso interna de Scrolls
        let pct = Math.round(((idx) / (data.words.length - 1)) * 100);
        cont.querySelector('.activity-progress-fill').style.width = pct + '%';

        cont.querySelector('#fc-word').textContent = data.words[idx];
        cont.querySelector('#fc-def').textContent = data.defs[idx];
        cont.querySelector('#fc-ex').textContent = '📖 ' + data.examples[idx];
        cont.querySelector('#fc-count').textContent = (idx+1)+'/'+data.words.length;
        
        if (idx === data.words.length-1) { 
            state.done['scrolls']=true; 
            document.getElementById('s-scrolls').classList.remove('hidden'); 
        }
    };
    
    // HTML del Scroll incluyendo la barra de progreso
    cont.innerHTML = `<h2>Study Scrolls <span id="fc-count" style="font-size:1.2rem; color:#666;"></span></h2>
    <div class="activity-progress"><div class="activity-progress-track"><div class="activity-progress-fill" style="width:0%;"></div></div></div>
    <div class="flashcard" onclick="this.classList.toggle('flipped')">
      <div class="flashcard-inner">
        <div class="front">
          <button class="tts-btn" onclick="event.stopPropagation(); speak(DB[state.unit].words[${idx}])" id="dynamic-audio-btn"><i class="fas fa-volume-up"></i></button>
          <h3 id="fc-word"></h3>
        </div>
        <div class="back">
          <p id="fc-def"></p>
          <p id="fc-ex" class="example-sentence"></p>
        </div>
      </div>
    </div>
    <button class="btn" id="prev">Prev</button>
    <button class="btn" id="next">Next</button>`;
    
    cont.querySelector('#prev').onclick = () => { 
        if(idx>0) { 
            idx--; 
            // Actualizar la función onclick del botón de audio para que lea la nueva palabra
            document.getElementById('dynamic-audio-btn').onclick = (e) => { e.stopPropagation(); speak(data.words[idx]); };
            update(); 
        } 
    };
    cont.querySelector('#next').onclick = () => { 
        if(idx<data.words.length-1) { 
            idx++; 
            // Actualizar la función onclick del botón de audio para que lea la nueva palabra
            document.getElementById('dynamic-audio-btn').onclick = (e) => { e.stopPropagation(); speak(data.words[idx]); };
            update(); 
        } 
    };
    
    // Asegurar que el audio de la primera tarjeta funcione
    document.getElementById('dynamic-audio-btn').onclick = (e) => { e.stopPropagation(); speak(data.words[idx]); };
    
    update();
}

function renderQuiz(cont, data) {
    let qPos = 0, failed = false;
    const render = () => {
        failed = false;
        let pct = Math.round((qPos / data.words.length) * 100);
        let word = data.words[qPos], correct = data.defs[qPos];
        let opts = [correct, ...data.defs.filter(d=>d!==correct).sort(()=>.5-Math.random()).slice(0,3)].sort(()=>.5-Math.random());
        cont.innerHTML = `<h2>Definition Quiz <span style="font-size:1.2rem; color:#666;">(${qPos+1}/${data.words.length})</span></h2>
        <div class="activity-progress"><div class="activity-progress-track"><div class="activity-progress-fill" style="width:${pct}%;"></div></div></div>
        <p style="font-size:1.5rem"><b>"${word}"</b></p>` + opts.map((o,i)=>`<div class="quiz-option" onclick="check(${i}, ${opts.indexOf(correct)})">${o}</div>`).join('') + `<div id="h" class="hint-box">💡 Hint: ${data.hints[qPos]}</div>`;
    };
    window.check = (i, c) => {
        let els = cont.querySelectorAll('.quiz-option');
        if (els[i].classList.contains('wrong') || els[i].classList.contains('correct')) return;
        
        if (i===c) { 
            els[i].classList.add('correct'); if(!failed) state.firstTryPoints++;
            setTimeout(()=>{ qPos++; if(qPos<data.words.length) render(); else { state.done['quiz']=true; document.getElementById('s-quiz').classList.remove('hidden'); show('menu'); } }, 1000);
        } else { failed=true; els[i].classList.add('wrong'); cont.querySelector('#h').classList.add('active'); }
    };
    render();
}

function renderChamber(cont, data) {
    let idx = 0, failed = false;
    const render = () => {
        failed = false;
        let pct = Math.round((idx / data.sentences.length) * 100);
        let item = data.sentences[idx], tokens = item.c.match(/\S+/g), sel = [];
        const draw = () => {
            cont.querySelector('#ans').innerHTML = sel.map((t, index)=>`<div class="answer-tile" onclick="remTile(${index})">${t}</div>`).join('');
            cont.querySelector('#bank').innerHTML = tokens.map((t,i)=>`<div class="word-tile ${sel.includes(t)?'used':''}" onclick="if(!sel.includes('${t}')){sel.push('${t}'); draw();}">${t}</div>`).sort(()=>.5-Math.random()).join('');
        };
        
        cont.innerHTML = `<h2>Sentence Chamber <span style="font-size:1.2rem; color:#666;">(${idx+1}/${data.sentences.length})</span></h2>
        <div class="activity-progress"><div class="activity-progress-track"><div class="activity-progress-fill" style="width:${pct}%;"></div></div></div>
        <div id="ans" class="answer-row"></div><div id="bank" class="word-bank"></div>
        <button class="btn" id="chk">Check Answer</button><button class="btn" style="background:#555;" id="clr">Clear</button><div id="h" class="hint-box" style="border-color:var(--danger); color:var(--danger); background:#f8d7da;">❌ Incorrect order! Try again.</div>`;
        
        window.remTile = (indexToRemove) => {
            sel.splice(indexToRemove, 1);
            draw();
        };

        cont.querySelector('#clr').onclick = () => { sel=[]; draw(); };
        cont.querySelector('#chk').onclick = () => {
            if(sel.join(' ').toLowerCase() === item.c.toLowerCase()){ 
                if(!failed) state.firstTryPoints++; 
                cont.querySelector('#ans').style.borderColor = '#28a745';
                setTimeout(()=>{ idx++; if(idx<data.sentences.length) render(); else { state.done['chamber']=true; document.getElementById('s-chamber').classList.remove('hidden'); show('menu'); } }, 1000);
            } else { failed=true; sel=[]; draw(); cont.querySelector('#h').classList.add('active'); }
        };
        draw();
    };
    render();
}

function renderBlanks(cont, data) {
    let idx = 0, failed = false;
    const render = () => {
        failed = false;
        let pct = Math.round((idx / data.words.length) * 100);
        cont.innerHTML = `<h2>Fill the Blanks <span style="font-size:1.2rem; color:#666;">(${idx+1}/${data.words.length})</span></h2>
        <div class="activity-progress"><div class="activity-progress-track"><div class="activity-progress-fill" style="width:${pct}%;"></div></div></div>
        <p style="font-size:1.4rem; font-weight:bold;">${data.cloze[idx]}</p>
        <input type="text" id="in" style="display:block;margin:20px auto; text-align:center; max-width:350px;" placeholder="Type here...">
        <button class="btn" id="chk">Check Answer</button><div id="h" class="hint-box">💡 Hint: ${data.hints[idx]}</div>`;
        
        setTimeout(() => cont.querySelector('#in').focus(), 100);

        cont.querySelector('#chk').onclick = () => {
            let val = cont.querySelector('#in').value.trim();
            if(val.toLowerCase() === data.words[idx].toLowerCase()){
                if(!failed) state.firstTryPoints++;
                cont.querySelector('#in').style.borderColor = '#28a745';
                cont.querySelector('#in').style.backgroundColor = '#d4edda';
                setTimeout(()=>{ idx++; if(idx<data.words.length) render(); else { state.done['blanks']=true; document.getElementById('s-blanks').classList.remove('hidden'); show('menu'); } }, 1000);
            } else { failed=true; cont.querySelector('#in').value=''; cont.querySelector('#in').style.borderColor = 'var(--danger)'; cont.querySelector('#h').classList.add('active'); cont.querySelector('#in').focus(); }
        };
        // Permitir que la tecla Enter funcione
        cont.querySelector('#in').addEventListener("keypress", function(event) {
            if (event.key === "Enter") { event.preventDefault(); cont.querySelector('#chk').click(); }
        });
    };
    render();
}

function claimCert() {
    let grade = ((state.firstTryPoints / state.totalPossiblePoints) * 10).toFixed(1);
    let formData = new FormData();
    formData.append("name", state.name); formData.append("section", state.section);
    formData.append("unit", state.unit); formData.append("score", grade);
    fetch("https://script.google.com/macros/s/AKfycbxeubqXtPDtnevgtk93zvcs9Y1z4GEbpl_KU-FFlBPGeGY_n0Yipbm92brwns-AElHhVg/exec", { method:"POST", body:formData, mode:"no-cors" });
    localStorage.setItem(state.name.toLowerCase()+'-'+state.section+'-'+state.unit, 'COMPLETED');
    show('cert');
    document.getElementById('cert-name').textContent = state.name;
    document.getElementById('cert-unit').textContent = state.unit;
    document.getElementById('cert-final-grade').textContent = grade;
}
</script>
